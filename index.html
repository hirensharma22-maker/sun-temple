<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modhera AR - Hiren Sharma</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* લોડિંગ સ્ક્રીન માટે સ્ટાઈલ */
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0,0,0,0.5); color: white; z-index: 2;
      }
    </style>
  </head>

  <body>
    <div id="scanning-overlay">
      <p>મોઢેરા મંદિરના ફોટાને સ્કેન કરો...</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/examples/image-tracking/assets/card-example/card.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="templeModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/examples/image-tracking/assets/band-example/bear/scene.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.05 0.05 0.05" src="#templeModel" animation="property: rotation; to: 0 360 0; dur: 10000; fill: forwards; loop: true"></a-gltf-model>
        
        <a-text value="Modhera Sun Temple" color="#FFD700" align="center" width="2" position="0 0.6 0"></a-text>
      </a-entity>
    </a-scene>

    <script>
      // જ્યારે કેમેરો માર્કરને શોધી લે ત્યારે ઓવરલે હટાવી દેવો
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener("targetFound", event => {
        document.getElementById("scanning-overlay").style.display = "none";
      });
      sceneEl.addEventListener("targetLost", event => {
        document.getElementById("scanning-overlay").style.display = "flex";
      });
    </script>
  </body>
</html>
