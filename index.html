<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modhera Temple AR - Hiren Sharma</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0,0,0,0.7); color: white; z-index: 2;
        font-family: sans-serif; text-align: center;
      }
    </style>
  </head>

  <body>
    <div id="scanning-overlay">
      <div>
        <p>📸 મોઢેરા મંદિરના ફોટા સામે કેમેરો રાખો...</p>
        <small>(બનાવનાર: હિરેન શર્મા)</small>
      </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="templeModel" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/StructureFormula/glTF/StructureFormula.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model rotation="0 0 0" position="0 -0.4 0" scale="0.1 0.1 0.1" src="#templeModel" 
                      animation="property: rotation; to: 0 360 0; dur: 15000; loop: true"></a-gltf-model>
        
        <a-text value="Modhera Sun Temple" color="#FFD700" align="center" width="3" position="0 0.8 0"></a-text>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener("targetFound", event => {
        document.getElementById("scanning-overlay").style.display = "none";
      });
      sceneEl.addEventListener("targetLost", event => {
        document.getElementById("scanning-overlay").style.display = "flex";
      });
    </script>
  </body>
</html>
